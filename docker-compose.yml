
version: '3.8'

services:
  # Enhanced AI Engineer Service - Main orchestrator with self-learning capabilities
  ai-engineer:
    build:
      context: .
      dockerfile: Dockerfile.ai-engineer
    container_name: quantum-ai-engineer-enhanced
    ports:
      - "8080:8080"  # CLI interface and API
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock  # For Docker operations
      - ~/.gitconfig:/root/.gitconfig:ro  # Git configuration
      - ~/.ssh:/root/.ssh:ro  # SSH keys for Git operations
      - learning-memory:/workspace/memory  # Persistent memory storage
      - learning-feedback:/workspace/feedback  # Persistent feedback storage
      - learning-knowledge:/workspace/knowledge  # Persistent knowledge storage
    environment:
      - PYTHONPATH=/workspace
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - WORKSPACE_PATH=/workspace
      - LEARNING_ENABLED=true
      - ADAPTATION_MODE=automatic
    depends_on:
      - patch-mcp
      - dashboard-mcp
      - auto-retry
      - mcp-learning
    networks:
      - quantum-network
    restart: unless-stopped
    command: python -m assistant.enhanced_core --mode server --port 8080

  # MCP Learning Server - Simplified self-learning capabilities
  mcp-learning:
    build:
      context: .
      dockerfile: Dockerfile.ai-engineer
    container_name: quantum-mcp-learning-simple
    ports:
      - "8084:8084"  # MCP Learning Server API
    volumes:
      - .:/workspace
      - learning-memory:/workspace/memory  # Shared memory storage
      - learning-feedback:/workspace/feedback  # Shared feedback storage
      - learning-knowledge:/workspace/knowledge  # Shared knowledge storage
    environment:
      - PYTHONPATH=/workspace
      - MCP_SERVER_NAME=learning-server-simple
      - FLASK_ENV=production
    networks:
      - quantum-network
    restart: unless-stopped
    command: python assistant/mcp_simple_server.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Simple Dashboard Service
  simple-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.ai-engineer
    container_name: quantum-simple-dashboard
    ports:
      - "8085:8085"  # Simple dashboard port
    volumes:
      - .:/workspace
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    environment:
      - PYTHONPATH=/workspace
      - DISPLAY=${DISPLAY:-:0}
      - MCP_SERVER_URL=http://mcp-learning:8084
    depends_on:
      - mcp-learning
    networks:
      - quantum-network
    restart: unless-stopped
    command: python tk_simple_dashboard.py

  # Patch Generator MCP Service
  patch-mcp:
    build:
      context: .
      dockerfile: Dockerfile.patch-mcp
    container_name: quantum-patch-mcp
    ports:
      - "8081:8081"
    volumes:
      - .:/workspace
    environment:
      - PYTHONPATH=/workspace
      - MCP_SERVER_NAME=patch-generator
    networks:
      - quantum-network
    restart: unless-stopped
    command: python tk_patch_generator.py --mcp-mode --port 8081

  # Enhanced Dashboard MCP Service with Learning Metrics
  dashboard-mcp:
    build:
      context: .
      dockerfile: Dockerfile.dashboard-mcp
    container_name: quantum-dashboard-enhanced
    ports:
      - "5000:5000"  # Enhanced web dashboard
      - "8082:8082"  # MCP interface
    volumes:
      - .:/workspace
    environment:
      - PYTHONPATH=/workspace
      - MCP_SERVER_NAME=dashboard
      - FLASK_ENV=production
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    depends_on:
      - ai-engineer
      - mcp-learning
    networks:
      - quantum-network
    restart: unless-stopped
    command: python tk_enhanced_dashboard.py

  # Auto-Retry Service
  auto-retry:
    build:
      context: .
      dockerfile: Dockerfile.auto-retry
    container_name: quantum-auto-retry
    ports:
      - "8083:8083"
    volumes:
      - .:/workspace
    environment:
      - PYTHONPATH=/workspace
      - MCP_SERVER_NAME=auto-retry
    networks:
      - quantum-network
    restart: unless-stopped
    command: python tk_auto_retry.py --mcp-mode --port 8083

networks:
  quantum-network:
    driver: bridge

volumes:
  workspace-data:
    driver: local
  learning-memory:
    driver: local
  learning-feedback:
    driver: local
  learning-knowledge:
    driver: local
